<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Chronostasis — Flood Intelligence Environment</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        mono: ['"Space Mono"', 'monospace'],
        sans: ['"DM Sans"', 'sans-serif'],
      },
      colors: {
        ink: '#060d14',
        surface: '#0c1a26',
        panel: '#0f2033',
        border: '#1a3448',
        muted: '#2a4a63',
        cyan: { DEFAULT: '#00d4ff', dim: '#0099bb', glow: 'rgba(0,212,255,0.12)' },
        emerald: { DEFAULT: '#00e887', dim: '#00a85f', glow: 'rgba(0,232,135,0.12)' },
        amber: { DEFAULT: '#ffb340', dim: '#cc8800', glow: 'rgba(255,179,64,0.12)' },
        rose: { DEFAULT: '#ff4d6d', dim: '#cc2244', glow: 'rgba(255,77,109,0.12)' },
      },
      animation: {
        'pulse-slow': 'pulse 3s ease-in-out infinite',
        'scan': 'scan 2s linear infinite',
        'fade-in': 'fadeIn 0.4s ease-out',
        'slide-up': 'slideUp 0.35s ease-out',
      },
      keyframes: {
        scan: { '0%': { transform: 'translateY(-100%)' }, '100%': { transform: 'translateY(400%)' }},
        fadeIn: { from: { opacity: 0 }, to: { opacity: 1 }},
        slideUp: { from: { opacity: 0, transform: 'translateY(12px)' }, to: { opacity: 1, transform: 'translateY(0)' }},
      }
    }
  }
}
</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #060d14; color: #c8dde8; font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
  ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: #060d14; } ::-webkit-scrollbar-thumb { background: #1a3448; border-radius: 2px; }
  .scanline { position: fixed; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, rgba(0,212,255,0.4), transparent); animation: scan 4s linear infinite; pointer-events: none; z-index: 100; }
  .grid-bg { background-image: linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px); background-size: 32px 32px; }
  .glow-cyan { box-shadow: 0 0 20px rgba(0,212,255,0.15), 0 0 40px rgba(0,212,255,0.05); }
  .glow-emerald { box-shadow: 0 0 20px rgba(0,232,135,0.15), 0 0 40px rgba(0,232,135,0.05); }
  .glow-rose { box-shadow: 0 0 20px rgba(255,77,109,0.15); }
  .glow-amber { box-shadow: 0 0 20px rgba(255,179,64,0.15); }
  .terminal { font-family: 'Space Mono', monospace; font-size: 13px; line-height: 1.7; }
  .card { background: #0c1a26; border: 1px solid #1a3448; border-radius: 10px; }
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 10px; border-radius: 99px; font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 20px; border-radius: 6px; font-weight: 600; font-size: 13px; cursor: pointer; transition: all 0.15s; border: 1px solid; letter-spacing: 0.02em; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: rgba(0,212,255,0.12); border-color: rgba(0,212,255,0.4); color: #00d4ff; }
  .btn-primary:hover:not(:disabled) { background: rgba(0,212,255,0.22); border-color: #00d4ff; }
  .btn-emerald { background: rgba(0,232,135,0.12); border-color: rgba(0,232,135,0.4); color: #00e887; }
  .btn-emerald:hover:not(:disabled) { background: rgba(0,232,135,0.22); border-color: #00e887; }
  .btn-rose { background: rgba(255,77,109,0.12); border-color: rgba(255,77,109,0.4); color: #ff4d6d; }
  .btn-rose:hover:not(:disabled) { background: rgba(255,77,109,0.2); }
  .tab { padding: 6px 16px; font-size: 12px; font-weight: 600; font-family: 'Space Mono', monospace; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; color: #6a8fa8; letter-spacing: 0.04em; }
  .tab.active { color: #00d4ff; border-bottom-color: #00d4ff; }
  .tab:hover:not(.active) { color: #c8dde8; }
  .reward-bar { transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
  @keyframes blink { 0%,100%{opacity:1}50%{opacity:0} }
  .cursor::after { content: '▋'; animation: blink 1s step-end infinite; }
  .noise::before { content: ''; position: absolute; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; border-radius: inherit; }
</style>
</head>
<body class="grid-bg">
<div class="scanline"></div>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const BASE = '';

const REGIONS_META = {
  brahmaputra: { label: 'Brahmaputra', state: 'Assam', color: '#00d4ff', icon: '◈' },
  ganga:       { label: 'Ganga',       state: 'Bihar', color: '#00e887', icon: '◈' },
  mahanadi:    { label: 'Mahanadi',    state: 'Odisha', color: '#ffb340', icon: '◈' },
  krishna:     { label: 'Krishna',     state: 'Andhra Pradesh', color: '#a78bfa', icon: '◈' },
  godavari:    { label: 'Godavari',    state: 'Telangana / AP', color: '#f472b6', icon: '◈' },
};

const TASK_META = {
  flood_year_comparison:    { label: 'Flood Year Comparison', diff: 'EASY',   steps: 6,  color: '#00e887' },
  district_inundation_report: { label: 'District Inundation',   diff: 'MEDIUM', steps: 8,  color: '#ffb340' },
  flood_risk_forecast:      { label: 'Risk Forecast 2025',     diff: 'HARD',  steps: 10, color: '#ff4d6d' },
};

function Dot({ color, pulse }) {
  return (
    <span style={{ display:'inline-block', width:8, height:8, borderRadius:'50%', background:color, boxShadow:`0 0 6px ${color}`, flexShrink:0, ...(pulse ? { animation:'pulse 2s infinite' } : {}) }} />
  );
}

function Badge({ children, color = '#00d4ff' }) {
  return (
    <span className="badge" style={{ background: `${color}18`, border: `1px solid ${color}44`, color }}>
      {children}
    </span>
  );
}

function RewardBar({ value, max = 1 }) {
  const pct = Math.min(100, Math.round((value / max) * 100));
  const color = pct >= 70 ? '#00e887' : pct >= 40 ? '#ffb340' : '#ff4d6d';
  return (
    <div className="relative w-full h-2 rounded-full" style={{ background: '#1a3448' }}>
      <div className="reward-bar h-full rounded-full" style={{ width: `${pct}%`, background: color, boxShadow: `0 0 8px ${color}88` }} />
    </div>
  );
}

function StatPill({ label, value, color = '#00d4ff' }) {
  return (
    <div className="card p-3 flex flex-col gap-1">
      <span className="terminal text-xs" style={{ color: '#6a8fa8' }}>{label}</span>
      <span className="terminal font-bold text-sm" style={{ color }}>{value}</span>
    </div>
  );
}

function RegionSelector({ regions, selected, onSelect }) {
  return (
    <div className="flex flex-wrap gap-2">
      {Object.entries(REGIONS_META).map(([id, meta]) => {
        const r = regions.find(r => r.id === id);
        const active = selected === id;
        return (
          <button key={id} onClick={() => onSelect(id)}
            className="btn text-xs px-3 py-2 transition-all"
            style={{
              borderColor: active ? meta.color : '#1a3448',
              background: active ? `${meta.color}18` : 'transparent',
              color: active ? meta.color : '#6a8fa8',
              boxShadow: active ? `0 0 12px ${meta.color}33` : 'none',
            }}>
            <span style={{ fontSize: 14 }}>{meta.icon}</span>
            <div className="text-left">
              <div style={{ fontFamily: 'Space Mono', fontSize: 11, fontWeight: 700 }}>{meta.label}</div>
              <div style={{ fontSize: 10, opacity: 0.7, marginTop: 1 }}>{meta.state}</div>
            </div>
            {r && active && (
              <span className="ml-1 terminal" style={{ fontSize: 10, color: meta.color }}>
                {r.accuracy_pct}%
              </span>
            )}
          </button>
        );
      })}
    </div>
  );
}

function TaskSelector({ selected, onSelect }) {
  return (
    <div className="flex gap-2 flex-wrap">
      {Object.entries(TASK_META).map(([id, meta]) => {
        const active = selected === id;
        return (
          <button key={id} onClick={() => onSelect(id)}
            className="btn text-xs"
            style={{
              borderColor: active ? meta.color : '#1a3448',
              background: active ? `${meta.color}15` : 'transparent',
              color: active ? meta.color : '#6a8fa8',
              boxShadow: active ? `0 0 10px ${meta.color}22` : 'none',
            }}>
            <span className="badge" style={{ background: `${meta.color}22`, border: 'none', color: meta.color, fontSize: 9 }}>
              {meta.diff}
            </span>
            <span style={{ fontFamily: 'DM Sans', fontWeight: 500 }}>{meta.label}</span>
            <span className="terminal" style={{ fontSize: 10, opacity: 0.6 }}>/{meta.steps}</span>
          </button>
        );
      })}
    </div>
  );
}

function Terminal({ lines, loading }) {
  const ref = useRef(null);
  useEffect(() => { if (ref.current) ref.current.scrollTop = ref.current.scrollHeight; }, [lines]);
  return (
    <div ref={ref} className="terminal rounded-lg p-4 overflow-y-auto" style={{ background: '#040b10', border: '1px solid #1a3448', minHeight: 220, maxHeight: 340, fontSize: 12, lineHeight: 1.8 }}>
      {lines.length === 0 && (
        <span style={{ color: '#2a4a63' }}>$ awaiting command...</span>
      )}
      {lines.map((l, i) => (
        <div key={i} className="animate-fade-in" style={{ color: l.color || '#7fb3cc' }}>
          {l.prefix && <span style={{ color: '#2a6a8a', marginRight: 8 }}>{l.prefix}</span>}
          {l.text}
        </div>
      ))}
      {loading && (
        <div style={{ color: '#00d4ff' }} className="cursor">processing</div>
      )}
    </div>
  );
}

function EpisodePanel({ episode, regionId }) {
  if (!episode) return null;
  const meta = TASK_META[episode.task_id] || {};
  const regionColor = REGIONS_META[regionId]?.color || '#00d4ff';
  const rewardPct = Math.round(episode.total_reward * 100);
  return (
    <div className="card p-4 animate-slide-up">
      <div className="flex items-center justify-between mb-3">
        <div className="flex items-center gap-2">
          <Dot color={episode.done ? '#00e887' : '#ffb340'} pulse={!episode.done} />
          <span className="terminal text-xs" style={{ color: '#6a8fa8' }}>EPISODE</span>
        </div>
        <div className="flex gap-2">
          <Badge color={meta.color}>{meta.diff || '—'}</Badge>
          <Badge color={regionColor}>{REGIONS_META[regionId]?.label || regionId}</Badge>
        </div>
      </div>
      <div className="grid grid-cols-3 gap-3 mb-3">
        <StatPill label="STEP" value={`${episode.steps} / ${TASK_META[episode.task_id]?.steps || '?'}`} color="#c8dde8" />
        <StatPill label="REWARD" value={`${episode.total_reward.toFixed(3)}`} color={meta.color} />
        <StatPill label="STATUS" value={episode.done ? 'DONE' : 'LIVE'} color={episode.done ? '#00e887' : '#ffb340'} />
      </div>
      <div className="space-y-1">
        <div className="flex justify-between terminal text-xs mb-1" style={{ color: '#6a8fa8' }}>
          <span>CUMULATIVE REWARD</span>
          <span style={{ color: meta.color }}>{rewardPct}%</span>
        </div>
        <RewardBar value={episode.total_reward} />
      </div>
    </div>
  );
}

function StepHistory({ history, taskId }) {
  if (!history?.length) return null;
  const meta = TASK_META[taskId] || {};
  return (
    <div className="space-y-2">
      {history.slice(-5).map((h, i) => (
        <div key={i} className="card p-3 animate-slide-up" style={{ borderColor: h.reward > 0.3 ? `${meta.color}44` : '#1a3448' }}>
          <div className="flex items-start justify-between gap-3">
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-2 mb-1">
                <span className="badge" style={{ background: '#1a3448', color: '#6a8fa8', fontSize: 10 }}>STEP {h.step}</span>
                <RewardBar value={h.reward} />
                <span className="terminal text-xs" style={{ color: meta.color, whiteSpace: 'nowrap' }}>+{h.reward.toFixed(3)}</span>
              </div>
              <p className="text-xs leading-relaxed line-clamp-3" style={{ color: '#8ab0c4', fontFamily: 'DM Sans' }}>
                {h.action}
              </p>
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

function ChartView({ charts }) {
  const [active, setActive] = useState(null);
  if (!charts || !Object.keys(charts).length) return null;
  const keys = Object.keys(charts);
  if (!active || !charts[active]) {
    const first = keys.find(k => k !== 'error');
    if (first && active !== first) setActive(first);
  }
  const labels = { risk_zones: 'Risk Zones', sar_extent: 'SAR Extent', district_table: 'Districts', dashboard: 'Dashboard' };
  return (
    <div className="card overflow-hidden animate-slide-up">
      <div className="flex border-b" style={{ borderColor: '#1a3448' }}>
        {keys.filter(k => charts[k] && k !== 'error').map(k => (
          <button key={k} className={`tab ${active === k ? 'active' : ''}`} onClick={() => setActive(k)}>
            {labels[k] || k}
          </button>
        ))}
      </div>
      {active && charts[active] && (
        <div className="p-3">
          <img src={`data:image/png;base64,${charts[active]}`} alt={active} className="w-full rounded" style={{ imageRendering: 'crisp-edges' }} />
        </div>
      )}
    </div>
  );
}

function RegionStatsPanel({ regionData }) {
  if (!regionData) return null;
  const meta = REGIONS_META[regionData.id] || {};
  const color = meta.color || '#00d4ff';
  const peakArea = regionData.flood_areas?.[regionData.peak_year] || 0;
  return (
    <div className="card p-4 animate-slide-up">
      <div className="flex items-center gap-2 mb-4">
        <span style={{ fontSize: 20 }}>{meta.icon}</span>
        <div>
          <h3 className="font-semibold" style={{ color }}>{regionData.name}</h3>
          <p className="terminal text-xs" style={{ color: '#6a8fa8' }}>{regionData.state} · {regionData.river} River</p>
        </div>
        <div className="ml-auto">
          <Badge color={color}>{regionData.accuracy_pct}% ACC</Badge>
        </div>
      </div>
      <div className="grid grid-cols-2 gap-2 mb-4">
        <StatPill label="PEAK YEAR" value={regionData.peak_year} color={color} />
        <StatPill label="PEAK AREA" value={`${peakArea?.toLocaleString()} km²`} color="#ff4d6d" />
        <StatPill label="CHRONIC AREA" value={`${regionData.chronic_km2?.toLocaleString()} km²`} color="#ffb340" />
        <StatPill label="AT-RISK POP." value={`${(regionData.chronic_pop/1e6).toFixed(1)}M`} color="#a78bfa" />
      </div>
      <div className="space-y-2">
        <p className="terminal text-xs mb-2" style={{ color: '#6a8fa8' }}>SAR FLOOD EXTENT (km²)</p>
        {regionData.flood_areas && Object.entries(regionData.flood_areas).map(([yr, area]) => {
          const isPeak = parseInt(yr) === regionData.peak_year;
          const max = Math.max(...Object.values(regionData.flood_areas));
          return (
            <div key={yr} className="flex items-center gap-3">
              <span className="terminal text-xs w-10" style={{ color: isPeak ? '#ff4d6d' : '#6a8fa8' }}>{yr}</span>
              <div className="flex-1 h-1.5 rounded-full" style={{ background: '#1a3448' }}>
                <div className="h-full rounded-full transition-all duration-700"
                  style={{ width: `${(area/max)*100}%`, background: isPeak ? '#ff4d6d' : color, boxShadow: isPeak ? '0 0 8px #ff4d6d88' : 'none' }} />
              </div>
              <span className="terminal text-xs w-20 text-right" style={{ color: isPeak ? '#ff4d6d' : '#8ab0c4' }}>{area?.toLocaleString()}</span>
              {isPeak && <Badge color="#ff4d6d">PEAK</Badge>}
            </div>
          );
        })}
      </div>
      {regionData.chronic_districts && (
        <div className="mt-4">
          <p className="terminal text-xs mb-2" style={{ color: '#6a8fa8' }}>CHRONIC DISTRICTS</p>
          <div className="flex flex-wrap gap-1">
            {regionData.chronic_districts.map(d => (
              <span key={d} className="badge" style={{ background: '#ffb34018', border: '1px solid #ffb34044', color: '#ffb340', fontSize: 10 }}>{d}</span>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function AllRegionsSummary({ summary }) {
  if (!summary?.length) return null;
  return (
    <div className="card overflow-hidden animate-slide-up">
      <div className="px-4 py-3 border-b flex items-center gap-2" style={{ borderColor: '#1a3448' }}>
        <Dot color="#00d4ff" />
        <span className="terminal text-xs" style={{ color: '#6a8fa8' }}>ALL BASINS — COMPARATIVE OVERVIEW</span>
      </div>
      <div className="divide-y" style={{ borderColor: '#1a3448' }}>
        {summary.map((r, i) => {
          const meta = REGIONS_META[r.id] || {};
          const color = meta.color || '#00d4ff';
          const maxArea = Math.max(...summary.map(s => s.peak_flood_km2 || 0));
          return (
            <div key={r.id} className="px-4 py-3 flex items-center gap-4 hover:bg-white hover:bg-opacity-5 transition-colors cursor-default">
              <span className="terminal text-xs w-4" style={{ color: '#2a4a63' }}>{i+1}</span>
              <div className="w-24 flex-shrink-0">
                <div className="font-medium text-sm" style={{ color }}>{meta.label}</div>
                <div className="terminal text-xs" style={{ color: '#6a8fa8' }}>{r.name?.split(' ')[0]}</div>
              </div>
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2 mb-0.5">
                  <div className="flex-1 h-1.5 rounded-full" style={{ background: '#1a3448' }}>
                    <div className="h-full rounded-full" style={{ width: `${((r.peak_flood_km2||0)/maxArea)*100}%`, background: color }} />
                  </div>
                  <span className="terminal text-xs w-20 text-right" style={{ color }}>{r.peak_flood_km2?.toLocaleString()} km²</span>
                </div>
              </div>
              <div className="flex gap-2 flex-shrink-0">
                <Badge color={color}>{r.accuracy_pct}%</Badge>
                <span className="terminal text-xs" style={{ color: '#6a8fa8' }}>{r.peak_year}</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────
function App() {
  const [regions, setRegions] = useState([]);
  const [health, setHealth] = useState(null);
  const [selectedRegion, setSelectedRegion] = useState('brahmaputra');
  const [selectedTask, setSelectedTask] = useState('flood_year_comparison');
  const [report, setReport] = useState(null);
  const [episode, setEpisode] = useState(null);
  const [charts, setCharts] = useState(null);
  const [termLines, setTermLines] = useState([]);
  const [loading, setLoading] = useState(false);
  const [activeTab, setActiveTab] = useState('demo');

  const log = (text, color, prefix) => setTermLines(prev => [...prev.slice(-80), { text, color, prefix }]);

  useEffect(() => {
    fetch(`${BASE}/health`).then(r => r.json()).then(setHealth).catch(() => {});
    fetch(`${BASE}/regions`).then(r => r.json()).then(setRegions).catch(() => {});
    fetch(`${BASE}/report`).then(r => r.json()).then(d => {
      setReport(d);
      if (d.episode) setEpisode(d.episode);
    }).catch(() => {});
  }, []);

  const handleRegionSelect = useCallback(async (id) => {
    setSelectedRegion(id);
    setCharts(null);
    setEpisode(null);
    try {
      const d = await fetch(`${BASE}/report`).then(r => r.json());
      setReport(d);
    } catch {}
  }, []);

  const doReset = useCallback(async () => {
    setLoading(true);
    log(`→ POST /reset  task=${selectedTask}  region=${selectedRegion}`, '#00d4ff', '▶');
    try {
      const r = await fetch(`${BASE}/reset`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ task_id: selectedTask, region_id: selectedRegion })
      });
      const d = await r.json();
      if (!r.ok) { log(`✗ ${d.detail}`, '#ff4d6d', '✗'); return; }
      log(`✓ episode started — ${d.task_description?.substring(0,80)}...`, '#00e887', '✓');
      log(`  region: ${d.region_name}  steps: ${d.max_steps}`, '#6a8fa8');
      setEpisode({ task_id: selectedTask, total_reward: 0, steps: 0, done: false, history: [] });
      setCharts(null);
    } catch (e) { log(`✗ ${e.message}`, '#ff4d6d', '✗'); }
    finally { setLoading(false); }
  }, [selectedTask, selectedRegion]);

  const doAgentStep = useCallback(async () => {
    setLoading(true);
    log(`→ POST /agent/step  task=${selectedTask}  region=${selectedRegion}`, '#00d4ff', '▶');
    try {
      const r = await fetch(`${BASE}/agent/step`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ task_id: selectedTask, region_id: selectedRegion })
      });
      const d = await r.json();
      if (!r.ok) { log(`✗ ${d.detail}`, '#ff4d6d', '✗'); return; }
      log(`  [step ${d.step}] reward=${d.reward?.toFixed(3)}  done=${d.done}`, '#ffb340', 'ℹ');
      if (d.result) log(`  ↳ ${d.result}`, '#6a8fa8');
      log(`  agent: ${d.agent_message?.substring(0,120)}${d.agent_message?.length > 120 ? '...' : ''}`, '#8ab0c4');
      setEpisode(prev => ({
        task_id: selectedTask,
        total_reward: d.total_reward || (prev?.total_reward || 0) + (d.reward || 0),
        steps: d.step,
        done: d.done,
        history: [...(prev?.history || []), { step: d.step, action: d.agent_message, reward: d.reward, done: d.done }]
      }));
      if (d.done) {
        log(`✓ episode complete — total reward: ${d.total_reward?.toFixed(3)}`, '#00e887', '✓');
        await doRender();
      }
    } catch (e) { log(`✗ ${e.message}`, '#ff4d6d', '✗'); }
    finally { setLoading(false); }
  }, [selectedTask, selectedRegion]);

  const doRender = useCallback(async () => {
    log(`→ POST /render  region=${selectedRegion}`, '#a78bfa', '▶');
    try {
      const r = await fetch(`${BASE}/render`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ region_id: selectedRegion })
      });
      const d = await r.json();
      if (d.charts) { setCharts(d.charts); log(`✓ charts rendered: ${d.chart_names?.join(', ')}`, '#a78bfa', '✓'); }
    } catch (e) { log(`✗ render failed: ${e.message}`, '#ff4d6d', '✗'); }
  }, [selectedRegion]);

  const currentRegionData = report
    ? { ...REGIONS_META[selectedRegion], ...report, id: selectedRegion,
        flood_areas: report.flood_areas
          ? Object.fromEntries(Object.entries(report.flood_areas).map(([k,v])=>[parseInt(k),v]))
          : {} }
    : null;

  const regionApiData = regions.find(r => r.id === selectedRegion);

  return (
    <div style={{ minHeight: '100vh' }}>
      {/* ── Header ── */}
      <header style={{ borderBottom: '1px solid #1a3448', background: 'rgba(6,13,20,0.9)', backdropFilter: 'blur(12px)', position: 'sticky', top: 0, zIndex: 50 }}>
        <div style={{ maxWidth: 1280, margin: '0 auto', padding: '0 24px', height: 56, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <div className="flex items-center gap-3">
            <div style={{ width: 32, height: 32, background: 'linear-gradient(135deg, #00d4ff22, #00e88722)', border: '1px solid #00d4ff44', borderRadius: 8, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 16 }}>🌊</div>
            <div>
              <span className="font-semibold tracking-tight" style={{ fontSize: 16, color: '#e8f4f8' }}>Chronostasis</span>
              <span className="terminal ml-2 text-xs" style={{ color: '#2a6a8a' }}>v2.0</span>
            </div>
          </div>
          <div className="flex items-center gap-3">
            {health && (
              <>
                <div className="flex items-center gap-2 terminal text-xs" style={{ color: '#6a8fa8' }}>
                  <Dot color="#00e887" pulse />
                  <span>ENV LIVE</span>
                </div>
                {health.gee_available && <Badge color="#00e887">GEE</Badge>}
                {health.llm_configured && <Badge color="#a78bfa">LLM</Badge>}
                <Badge color="#00d4ff">{health.regions?.length} BASINS</Badge>
              </>
            )}
          </div>
        </div>
      </header>

      <div style={{ maxWidth: 1280, margin: '0 auto', padding: '28px 24px', display: 'grid', gridTemplateColumns: '1fr 380px', gap: 24, alignItems: 'start' }}>

        {/* ── Left column ── */}
        <div className="space-y-5">

          {/* Hero text */}
          <div>
            <h1 style={{ fontSize: 28, fontWeight: 600, color: '#e8f4f8', lineHeight: 1.2, letterSpacing: '-0.02em' }}>
              Flood Intelligence{' '}
              <span style={{ color: '#00d4ff', textShadow: '0 0 20px rgba(0,212,255,0.4)' }}>Environment</span>
            </h1>
            <p style={{ marginTop: 8, color: '#6a8fa8', fontSize: 14, lineHeight: 1.6 }}>
              OpenEnv-compatible RL environment · 5 Indian river basins · Sentinel-1 SAR + CHIRPS + SRTM
            </p>
          </div>

          {/* Region selector */}
          <div className="card p-4 space-y-3">
            <div className="flex items-center gap-2">
              <span className="terminal text-xs" style={{ color: '#6a8fa8' }}>SELECT BASIN</span>
            </div>
            <RegionSelector regions={regions} selected={selectedRegion} onSelect={handleRegionSelect} />
          </div>

          {/* Tabs */}
          <div>
            <div className="flex border-b" style={{ borderColor: '#1a3448' }}>
              {[['demo','AGENT DEMO'],['stats','BASIN STATS'],['all','ALL BASINS'],['api','API']].map(([id,label]) => (
                <button key={id} className={`tab ${activeTab===id?'active':''}`} onClick={() => setActiveTab(id)}>{label}</button>
              ))}
            </div>

            <div className="mt-4 space-y-4">
              {activeTab === 'demo' && (
                <>
                  <div className="card p-4 space-y-3">
                    <div className="flex items-center gap-2 mb-1">
                      <Dot color="#00d4ff" />
                      <span className="terminal text-xs" style={{ color: '#6a8fa8' }}>TASK CONFIGURATION</span>
                    </div>
                    <TaskSelector selected={selectedTask} onSelect={setSelectedTask} />
                    <div className="flex gap-2 pt-1">
                      <button className="btn btn-primary" onClick={doReset} disabled={loading}>
                        ◈ Reset Episode
                      </button>
                      <button className="btn btn-emerald" onClick={doAgentStep} disabled={loading}>
                        ▶ Agent Step
                      </button>
                      <button className="btn" onClick={doRender} disabled={loading}
                        style={{ borderColor:'#a78bfa44', background:'#a78bfa12', color:'#a78bfa' }}>
                        ◎ Render Charts
                      </button>
                      <button className="btn btn-rose" onClick={() => setTermLines([])} style={{ marginLeft: 'auto' }}>
                        Clear
                      </button>
                    </div>
                  </div>

                  <Terminal lines={termLines} loading={loading} />

                  {episode && <EpisodePanel episode={episode} regionId={selectedRegion} />}

                  {episode?.history?.length > 0 && (
                    <div>
                      <p className="terminal text-xs mb-2" style={{ color: '#6a8fa8' }}>STEP HISTORY</p>
                      <StepHistory history={episode.history} taskId={selectedTask} />
                    </div>
                  )}

                  {charts && <ChartView charts={charts} />}
                </>
              )}

              {activeTab === 'stats' && (
                <RegionStatsPanel regionData={currentRegionData || regionApiData} />
              )}

              {activeTab === 'all' && (
                <AllRegionsSummary summary={report?.all_regions_summary} />
              )}

              {activeTab === 'api' && (
                <div className="card p-4 space-y-4">
                  <p className="terminal text-xs" style={{ color: '#6a8fa8' }}>OPENENV API ENDPOINTS</p>
                  {[
                    ['POST', '/reset', 'Start episode', '{"task_id": "flood_year_comparison", "region_id": "brahmaputra"}'],
                    ['POST', '/step', 'Submit agent action', '{"message": "2022 had the largest SAR flood extent at 4812.3 km²..."}'],
                    ['GET',  '/state', 'Get episode state', null],
                    ['POST', '/agent/step', 'Run built-in LLM agent', '{"task_id": "...", "region_id": "..."}'],
                    ['GET',  '/regions', 'List all 5 river basins', null],
                    ['GET',  '/tasks', 'List all 3 tasks', null],
                    ['GET',  '/report', 'Full region + episode data', null],
                    ['POST', '/render', 'Generate matplotlib charts', '{"region_id": "ganga"}'],
                    ['GET',  '/health', 'Environment health check', null],
                  ].map(([method, path, desc, body]) => (
                    <div key={path} className="card p-3 space-y-1">
                      <div className="flex items-center gap-2">
                        <Badge color={method==='POST'?'#00e887':'#00d4ff'}>{method}</Badge>
                        <span className="terminal font-bold" style={{ color: '#e8f4f8', fontSize: 13 }}>{path}</span>
                        <span className="text-xs ml-auto" style={{ color: '#6a8fa8' }}>{desc}</span>
                      </div>
                      {body && (
                        <div className="terminal text-xs p-2 rounded mt-2" style={{ background: '#040b10', color: '#6a8fa8', fontSize: 11 }}>
                          {body}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>

        {/* ── Right column ── */}
        <div className="space-y-4">

          {/* Task cards */}
          <div className="space-y-3">
            <p className="terminal text-xs" style={{ color: '#6a8fa8' }}>TASKS</p>
            {Object.entries(TASK_META).map(([id, meta]) => (
              <div key={id} className="card p-4 cursor-pointer transition-all"
                onClick={() => { setSelectedTask(id); setActiveTab('demo'); }}
                style={{ borderColor: selectedTask===id ? `${meta.color}55` : '#1a3448', background: selectedTask===id ? `${meta.color}08` : '#0c1a26' }}>
                <div className="flex items-start justify-between gap-2 mb-2">
                  <span className="font-medium text-sm" style={{ color: selectedTask===id ? meta.color : '#c8dde8' }}>{meta.label}</span>
                  <Badge color={meta.color}>{meta.diff}</Badge>
                </div>
                <div className="flex gap-3 terminal text-xs" style={{ color: '#6a8fa8' }}>
                  <span>max {meta.steps} steps</span>
                  <span>·</span>
                  <span>reward ∈ (0,1)</span>
                </div>
              </div>
            ))}
          </div>

          {/* Baseline results */}
          <div className="card p-4 space-y-3">
            <div className="flex items-center gap-2">
              <Dot color="#a78bfa" />
              <span className="terminal text-xs" style={{ color: '#6a8fa8' }}>BASELINE RESULTS — Qwen2.5-72B</span>
            </div>
            {[['flood_year_comparison', 0.850], ['district_inundation_report', 0.620], ['flood_risk_forecast', 0.710]].map(([id, score]) => {
              const meta = TASK_META[id];
              return (
                <div key={id} className="space-y-1">
                  <div className="flex justify-between terminal text-xs">
                    <span style={{ color: '#6a8fa8' }}>{meta?.diff}</span>
                    <span style={{ color: meta?.color }}>{score.toFixed(3)}</span>
                  </div>
                  <RewardBar value={score} />
                </div>
              );
            })}
          </div>

          {/* Data sources */}
          <div className="card p-4 space-y-2">
            <p className="terminal text-xs mb-3" style={{ color: '#6a8fa8' }}>DATA SOURCES</p>
            {[
              ['Sentinel-1 SAR VV', '2022–2024 June–Sept', '#00d4ff'],
              ['CHIRPS Daily', 'Ground-calibrated rainfall', '#00e887'],
              ['HydroSHEDS 15ACC', 'Flow accumulation', '#ffb340'],
              ['SRTM DEM', 'Elevation & slope', '#a78bfa'],
              ['Landsat 8 NDWI', 'Permanent water mask', '#f472b6'],
              ['FAO GAUL', 'District boundaries', '#6a8fa8'],
            ].map(([src, desc, color]) => (
              <div key={src} className="flex items-center gap-2">
                <Dot color={color} />
                <div className="flex-1 min-w-0">
                  <span className="terminal text-xs font-bold" style={{ color }}>{src}</span>
                  <span className="terminal text-xs ml-2" style={{ color: '#6a8fa8' }}>{desc}</span>
                </div>
              </div>
            ))}
          </div>

          {/* Links */}
          <div className="card p-4 space-y-2">
            <p className="terminal text-xs mb-2" style={{ color: '#6a8fa8' }}>LINKS</p>
            {[
              ['GitHub', 'lunasingha1928-oss/Chronostasis', 'https://github.com/lunasingha1928-oss/Chronostasis', '#00d4ff'],
              ['HF Space', 'LunaAmagi/chronostasis', 'https://huggingface.co/spaces/LunaAmagi/chronostasis', '#f4c842'],
              ['API Docs', '/docs', '/docs', '#a78bfa'],
            ].map(([label, text, href, color]) => (
              <a key={label} href={href} target="_blank" rel="noopener" className="flex items-center gap-2 hover:opacity-80 transition-opacity">
                <span className="terminal text-xs w-16" style={{ color: '#6a8fa8' }}>{label}</span>
                <span className="terminal text-xs" style={{ color }}>{text}</span>
              </a>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
