<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Chronostasis — Flood Intelligence</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{--gold:#C9962A;--gb:#E8B84B;--gd:#8B6515;--obs:#080808;--coal:#111111;--gr:#1a1a1a;--cr:#E8DCBC;--pa:#D4C89A}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--obs);color:var(--cr);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(201,150,42,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(201,150,42,0.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none}
body::after{content:'';position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),var(--gb),var(--gold),transparent);z-index:200}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--obs)}::-webkit-scrollbar-thumb{background:var(--gd)}
.fd{font-family:'Montserrat',sans-serif;font-weight:600}
.fm{font-family:'Share Tech Mono',monospace}
.fb{font-family:'Rajdhani',sans-serif}
.card{background:var(--coal);border:1px solid rgba(201,150,42,0.18);border-radius:2px;position:relative}
.card::before{content:'';position:absolute;top:-1px;left:16px;right:16px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.card-active{border-color:rgba(201,150,42,0.55)!important;box-shadow:0 0 28px rgba(201,150,42,0.18),inset 0 0 40px rgba(201,150,42,0.04)!important}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:12px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .2s;border-radius:1px}
.btn-g{background:rgba(201,150,42,.1);border:1px solid rgba(201,150,42,.4);color:var(--gb)}
.btn-g:hover:not(:disabled){background:rgba(201,150,42,.2);border-color:var(--gold);box-shadow:0 0 14px rgba(201,150,42,.25)}
.btn-g:disabled{opacity:.35;cursor:not-allowed}
.btn-d{background:rgba(139,58,10,.12);border:1px solid rgba(180,80,20,.3);color:#E87A40}
.bdg{display:inline-flex;align-items:center;padding:1px 7px;border-radius:1px;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:.1em;font-weight:700}
.bdg-e{background:rgba(40,120,40,.18);border:1px solid rgba(40,180,40,.25);color:#70D070}
.bdg-m{background:rgba(180,120,20,.18);border:1px solid rgba(220,160,40,.25);color:var(--gb)}
.bdg-h{background:rgba(180,40,40,.18);border:1px solid rgba(220,60,60,.25);color:#E87070}
.bdg-g{background:rgba(201,150,42,.12);border:1px solid rgba(201,150,42,.3);color:var(--gb)}
.bdg-lv{background:rgba(40,120,40,.12);border:1px solid rgba(40,180,40,.22);color:#70D070}
.ntab{padding:8px 14px;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:11px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .15s;color:#4A3A18;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none}
.ntab.active{color:var(--gb);border-bottom-color:var(--gold)}
.ntab:hover:not(.active){color:var(--pa)}
.term{background:#040404;border:1px solid rgba(201,150,42,.12);font-family:'Share Tech Mono',monospace;font-size:12px;line-height:1.8;padding:14px;overflow-y:auto}
.divg{height:1px;background:linear-gradient(90deg,transparent,rgba(201,150,42,.25),transparent)}
.stat{background:rgba(201,150,42,.04);border:1px solid rgba(201,150,42,.1);padding:10px 12px;border-radius:2px}
.rbtn{background:var(--coal);border:1px solid rgba(201,150,42,.14);padding:9px 12px;border-radius:2px;cursor:pointer;transition:all .18s;text-align:left}
.rbtn:hover{border-color:rgba(201,150,42,.35)}
.rbtn.active{background:rgba(201,150,42,.07);border-color:rgba(201,150,42,.55);box-shadow:0 0 14px rgba(201,150,42,.14)}
.deco{position:absolute;width:16px;height:16px}
.deco::before,.deco::after{content:'';position:absolute;background:var(--gold)}
.dtl{top:0;left:0}.dtl::before{top:0;left:0;width:10px;height:1px}.dtl::after{top:0;left:0;width:1px;height:10px}
.dtr{top:0;right:0}.dtr::before{top:0;right:0;width:10px;height:1px}.dtr::after{top:0;right:0;width:1px;height:10px}
.dbl{bottom:0;left:0}.dbl::before{bottom:0;left:0;width:10px;height:1px}.dbl::after{bottom:0;left:0;width:1px;height:10px}
.dbr{bottom:0;right:0}.dbr::before{bottom:0;right:0;width:10px;height:1px}.dbr::after{bottom:0;right:0;width:1px;height:10px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes ripple{0%{r:5;opacity:.8}100%{r:18;opacity:0}}
.af{animation:fadeIn .35s ease-out}
.au{animation:slideUp .3s ease-out}
.cur::after{content:'█';animation:blink 1s step-end infinite;color:var(--gold)}
.dotp{animation:pulse 2s ease-in-out infinite}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;
const B='';
const RC={critical:'#E87070',high:'#E8B84B',moderate:'#C9962A',low:'#70A070'};
const TM={
  flood_year_comparison:{label:'Flood Year Comparison',diff:'EASY',color:'#70D070',steps:6},
  district_inundation_report:{label:'District Inundation',diff:'MEDIUM',color:'#E8B84B',steps:8},
  flood_risk_forecast:{label:'Risk Forecast 2025',diff:'HARD',color:'#E87070',steps:10},
};
const SL={
  pre_monsoon:{label:'Pre-Monsoon',months:'Mar–May',c:'#C9962A'},
  kharif:{label:'Kharif',months:'Jun–Sep',c:'#E8B84B'},
  post_monsoon:{label:'Post-Monsoon',months:'Oct–Nov',c:'#C9962A'},
  rabi:{label:'Rabi',months:'Dec–Feb',c:'#8B6515'},
};

// Accurate India SVG path (clockwise from NW)
const INDIA_PATH="M 79.4,57.5 L 90.0,35.9 L 121.8,21.6 L 142.9,50.3 L 137.6,71.9 L 153.5,107.8 L 164.1,136.6 L 195.9,143.8 L 232.9,150.9 L 241.4,150.9 L 270.0,150.9 L 322.9,136.6 L 333.5,150.9 L 312.4,179.7 L 296.5,194.1 L 291.2,208.4 L 285.9,230.0 L 280.6,230.0 L 270.0,201.2 L 248.8,222.8 L 238.2,237.2 L 222.4,251.6 L 206.5,265.9 L 190.6,287.5 L 182.1,294.7 L 164.1,316.2 L 153.5,323.4 L 151.4,352.2 L 148.2,395.3 L 122.8,429.8 L 111.2,409.7 L 103.8,388.1 L 93.2,366.6 L 82.6,323.4 L 76.2,294.7 L 72.0,273.1 L 73.1,251.6 L 68.8,237.2 L 63.5,222.8 L 47.6,218.5 L 37.1,222.8 L 37.1,230.0 L 47.6,237.2 L 63.5,244.4 L 52.9,208.4 L 26.5,208.4 L 24.4,201.2 L 47.6,150.9 L 68.8,122.2 L 90.0,100.6 L 90.0,79.1 L 79.4,57.5 Z";

// Basin markers with corrected lat/lon projection
const BASINS=[
  {id:"brahmaputra",x:272.1,y:169.6,short:"BRAHM",color:"#E87070",risk:"critical",name:"Brahmaputra"},
  {id:"ganga",x:202.2,y:178.2,short:"GANGA",color:"#E87070",risk:"critical",name:"Ganga"},
  {id:"mahanadi",x:209.6,y:251.6,short:"MAHAN",color:"#E8B84B",risk:"high",name:"Mahanadi"},
  {id:"krishna",x:154.6,y:309.1,short:"KRISH",color:"#E8B84B",risk:"high",name:"Krishna"},
  {id:"godavari",x:167.3,y:294.7,short:"GODAV",color:"#E8B84B",risk:"high",name:"Godavari"},
  {id:"narmada",x:121.8,y:219.9,short:"NARMA",color:"#E8B84B",risk:"high",name:"Narmada"},
  {id:"tapti",x:93.2,y:241.5,short:"TAPTI",color:"#C9962A",risk:"moderate",name:"Tapti"},
  {id:"cauvery",x:127.1,y:380.9,short:"CAUV",color:"#C9962A",risk:"moderate",name:"Cauvery"},
  {id:"damodar",x:225.5,y:208.4,short:"DAMO",color:"#E8B84B",risk:"high",name:"Damodar"},
  {id:"sabarmati",x:73.1,y:212.8,short:"SABAR",color:"#C9962A",risk:"moderate",name:"Sabarmati"},
  {id:"mahi",x:79.4,y:222.8,short:"MAHI",color:"#C9962A",risk:"moderate",name:"Mahi"},
  {id:"baitarani",x:211.8,y:237.2,short:"BAIT",color:"#E8B84B",risk:"high",name:"Baitarani"},
  {id:"subarnarekha",x:217.1,y:222.8,short:"SUBAR",color:"#E8B84B",risk:"high",name:"Subarnarekha"},
  {id:"indus",x:103.8,y:93.4,short:"INDUS",color:"#E8B84B",risk:"high",name:"Indus"},
  {id:"luni",x:68.8,y:172.5,short:"LUNI",color:"#C9962A",risk:"moderate",name:"Luni"},
];

function DC({children,cls='',active=false,pad='16px'}){
  return(
    <div className={`card relative ${active?'card-active':''} ${cls}`} style={{padding:pad}}>
      <div className="deco dtl"/><div className="deco dtr"/>
      <div className="deco dbl"/><div className="deco dbr"/>
      {children}
    </div>
  );
}

function RBar({val}){
  const p=Math.min(100,Math.round(val*100));
  const c=p>=70?'#70D070':p>=40?'#E8B84B':'#E87070';
  return(
    <div style={{height:3,background:'#1a1a1a'}}>
      <div style={{height:'100%',width:`${p}%`,background:`linear-gradient(90deg,${c}55,${c})`,boxShadow:`0 0 8px ${c}44`,transition:'width .8s cubic-bezier(.4,0,.2,1)'}}/>
    </div>
  );
}

function Term({lines,loading}){
  const r=useRef(null);
  useEffect(()=>{if(r.current)r.current.scrollTop=r.current.scrollHeight;},[lines]);
  return(
    <div ref={r} className="term" style={{minHeight:200,maxHeight:280,position:'relative',overflow:'hidden'}}>
      {/* Scan line */}
      <div style={{position:'absolute',left:0,right:0,height:40,background:'linear-gradient(transparent,rgba(201,150,42,.025),transparent)',animation:'none',pointerEvents:'none',zIndex:1}}/>
      {!lines.length&&<span style={{color:'#3A2D10'}}>{'>'} CHRONOSTASIS v2.0 — AWAITING COMMAND...</span>}
      {lines.map((l,i)=>(
        <div key={i} style={{color:l.color||'#D4C89A'}}>
          {l.p&&<span style={{color:'#6B5A30',marginRight:8}}>{l.p}</span>}{l.t}
        </div>
      ))}
      {loading&&<div style={{color:'#C9962A'}} className="cur">PROCESSING</div>}
    </div>
  );
}

// India SVG map in sidebar
function IndiaMap({mapData,region,setRegion,season}){
  const [hov,setHov]=useState(null);
  const regions=mapData?.regions||[];
  const getSR=id=>{const r=regions.find(r=>r.id===id);return r?.seasonal_risk||0.5;};
  const getRL=id=>{const r=regions.find(r=>r.id===id);return r?.risk_level||'moderate';};
  const info=regions.find(r=>r.id===(hov||region));
  return(
    <DC cls="af">
      {/* Header */}
      <div style={{marginBottom:10}}>
        <div className="fm" style={{fontSize:9,color:'#4A3A18',letterSpacing:'.15em',marginBottom:4}}>◈ INDIA FLOOD RISK MAP</div>
        <div className="fm" style={{fontSize:8,color:'#3A2D10'}}>{season.replace('_',' ').toUpperCase()} SEASON</div>
      </div>
      {/* Risk legend */}
      <div style={{display:'flex',gap:8,marginBottom:10,flexWrap:'wrap'}}>
        {[['CRITICAL','#E87070'],['HIGH','#E8B84B'],['MOD','#C9962A']].map(([l,c])=>(
          <div key={l} style={{display:'flex',alignItems:'center',gap:3}}>
            <div style={{width:6,height:6,background:c,boxShadow:`0 0 4px ${c}`}}/>
            <span className="fm" style={{fontSize:7,color:'#4A3A18'}}>{l}</span>
          </div>
        ))}
      </div>
      {/* SVG Map */}
      <svg viewBox="0 0 360 460" style={{width:'100%',maxWidth:320,display:'block',margin:'0 auto',background:'rgba(4,4,4,0.8)',border:'1px solid rgba(201,150,42,0.1)'}}>
        {/* Grid */}
        {[80,140,200,260,320,380].map(y=><line key={y} x1="0" y1={y} x2="360" y2={y} stroke="rgba(201,150,42,0.025)" strokeWidth="0.5"/>)}
        {[60,110,160,210,260,310].map(x=><line key={x} x1={x} y1="0" x2={x} y2="460" stroke="rgba(201,150,42,0.025)" strokeWidth="0.5"/>)}
        {/* India outline */}
        <path d={INDIA_PATH} fill="rgba(201,150,42,0.04)" stroke="rgba(201,150,42,0.22)" strokeWidth="1.2" strokeLinejoin="round"/>
        {/* River basin markers */}
        {BASINS.map(b=>{
          const rc=RC[getRL(b.id)]||b.color;
          const sr=getSR(b.id);
          const isSel=region===b.id;
          const isHov=hov===b.id;
          const r1=Math.round(4+sr*5);
          return(
            <g key={b.id} style={{cursor:'pointer'}}
               onClick={()=>setRegion(b.id)}
               onMouseEnter={()=>setHov(b.id)}
               onMouseLeave={()=>setHov(null)}>
              {/* Glow rings */}
              {isSel&&<circle cx={b.x} cy={b.y} r={r1+12} fill={rc} opacity="0.06"/>}
              <circle cx={b.x} cy={b.y} r={r1+5} fill={rc} opacity={isSel?0.10:0.03}/>
              {/* Main pin */}
              <circle cx={b.x} cy={b.y} r={r1} fill={rc}
                opacity={isSel?1:0.75}
                stroke={isSel?'#E8B84B':rc}
                strokeWidth={isSel?1.5:0.5}/>
              {/* Pin center dot */}
              <circle cx={b.x} cy={b.y} r="2" fill="#040404" opacity="0.8"/>
              {/* Label — always show short name */}
              {(isSel||isHov)
                ?<>
                  <rect x={b.x-22} y={b.y-r1-19} width={44} height={13}
                    fill="#0a0a0a" stroke={rc} strokeWidth="0.5" rx="0" opacity="0.95"/>
                  <text x={b.x} y={b.y-r1-9} textAnchor="middle"
                    fill={rc} fontSize="7" fontFamily="Share Tech Mono,monospace" fontWeight="bold">{b.name}</text>
                </>
                :<text x={b.x} y={b.y+r1+9} textAnchor="middle"
                  fill={rc} fontSize="6" fontFamily="Share Tech Mono,monospace" opacity="0.65">{b.short}</text>
              }
            </g>
          );
        })}
        {/* Map label */}
        <text x="180" y="453" textAnchor="middle" fill="rgba(201,150,42,0.2)"
          fontSize="7" fontFamily="Share Tech Mono,monospace">15 RIVER BASINS — INDIA</text>
      </svg>
      {/* Selected basin quick info */}
      {info&&(
        <div style={{marginTop:10,padding:'10px 12px',background:'rgba(201,150,42,0.04)',border:'1px solid rgba(201,150,42,0.15)'}}>
          <div className="fb" style={{fontSize:13,fontWeight:700,color:'#E8B84B',marginBottom:2}}>{info.name}</div>
          <div className="fm" style={{fontSize:8,color:'#4A3A18',marginBottom:6}}>{info.state?.split('/')[0].trim()} · {info.river}</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:4}}>
            {[['RISK',(info.risk_level||'').toUpperCase(),RC[info.risk_level]||'#C9962A'],
              ['ACC',`${info.accuracy_pct}%`,'#C9962A'],
              ['POP',`${(info.chronic_pop/1e6).toFixed(1)}M`,'#E8B84B'],
              ['KM²',`${info.chronic_km2?.toLocaleString()}`,'#E87070']
            ].map(([l,v,c])=>(
              <div key={l} className="stat" style={{padding:'6px 8px'}}>
                <div className="fm" style={{fontSize:7,color:'#3A2D10',marginBottom:1}}>{l}</div>
                <div className="fm" style={{fontSize:11,color:c,fontWeight:700}}>{v}</div>
              </div>
            ))}
          </div>
          <div style={{marginTop:6}}>
            <div className="fm" style={{fontSize:7,color:'#3A2D10',marginBottom:2}}>SEASONAL RISK</div>
            <div style={{height:2,background:'#1a1a1a'}}>
              <div style={{height:'100%',width:`${(info.seasonal_risk||0)*100}%`,background:RC[info.risk_level]||'#C9962A',transition:'width .5s'}}/>
            </div>
          </div>
        </div>
      )}
    </DC>
  );
}

function App(){
  const[health,setHealth]=useState(null);
  const[map,setMap]=useState(null);
  const[region,setRegion]=useState('brahmaputra');
  const[task,setTask]=useState('flood_year_comparison');
  const[season,setSeason]=useState('kharif');
  const[ep,setEp]=useState(null);
  const[lines,setLines]=useState([]);
  const[loading,setLoading]=useState(false);
  const[activeTab,setActiveTab]=useState('demo');
  const[usingTrained,setUsingTrained]=useState(true);
  const[compareResult,setCompareResult]=useState(null);
  const[comparing,setComparing]=useState(false);
  const[chartImgs,setChartImgs]=useState({});
  const[chartsLoading,setChartsLoading]=useState(false);
  const[reportData,setReportData]=useState(null);
  const[floodTiles,setFloodTiles]=useState({});
  const[tileYear,setTileYear]=useState(2022);
  const[tileLoading,setTileLoading]=useState(false);
  const[activeLayer,setActiveLayer]=useState('risk');
  const leafletRef=useRef(null);
  const leafletMap=useRef(null);

  const log=(t,color='#D4C89A',p=null)=>setLines(prev=>[...prev.slice(-80),{t,color,p}]);

  useEffect(()=>{
    fetch(`${B}/health`).then(r=>r.json()).then(d=>{
    setHealth(d);
    if(d.using_trained_model!==undefined){
      setUsingTrained(d.using_trained_model);
    }
  }).catch(()=>{});
    fetch(`${B}/india_risk_map?season=kharif`).then(r=>r.json()).then(setMap).catch(()=>{});
  },[]);

  const fetchMap=useCallback(async s=>{
    try{const d=await fetch(`${B}/india_risk_map?season=${s}`).then(r=>r.json());setMap(d);}catch{}
  },[]);

  const handleSeason=s=>{setSeason(s);fetchMap(s);};

  const doReset=async()=>{
    setLoading(true);
    log(`→ RESET  task=${task}  region=${region}  season=${season}`,'#C9962A','◈');
    try{
      const r=await fetch(`${B}/reset`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({task_id:task,region_id:region,season})});
      const d=await r.json();
      if(!r.ok){log(`✗ ${d.detail}`,'#E87070','✗');return;}
      log(`✓ EPISODE STARTED`,'#70D070','✓');
      log(`  ${d.task_description?.substring(0,70)}...`,'#4A3A18');
      setEp({task_id:task,total_reward:0,steps:0,done:false,history:[]});
    }catch(e){log(`✗ ${e.message}`,'#E87070','✗');}
    finally{setLoading(false);}
  };

  const doStep=async()=>{
    setLoading(true);
    log(`→ AGENT STEP  task=${task}`,'#C9962A','▶');
    try{
      const r=await fetch(`${B}/agent/step`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({task_id:task,region_id:region})});
      const d=await r.json();
      if(!r.ok){log(`✗ ${d.detail}`,'#E87070','✗');return;}
      log(`  [STEP ${d.step}] REWARD=${d.reward?.toFixed(3)}  DONE=${d.done}`,'#E8B84B','ℹ');
      if(d.agent_message)log(`  ${d.agent_message?.substring(0,150)}...`,'#7A6830');
      setEp(prev=>({task_id:task,total_reward:d.total_reward||(prev?.total_reward||0)+(d.reward||0),steps:d.step,done:d.done,history:[...(prev?.history||[]),{step:d.step,reward:d.reward,action:d.agent_message}]}));
      if(d.done)log(`✓ COMPLETE — TOTAL: ${d.total_reward?.toFixed(3)}`,'#70D070','✓');
    }catch(e){log(`✗ ${e.message}`,'#E87070','✗');}
    finally{setLoading(false);}
  };

  const doCompare=async()=>{
    setComparing(true);
    log(`→ COMPARE trained vs baseline | task=${task} region=${region}`,'#C9962A','◈');
    try{
      const r=await fetch(`${B}/agent/compare`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({task_id:task,region_id:region})});
      const d=await r.json();
      if(!r.ok){log(`✗ ${d.error}`,'#E87070','✗');return;}
      setCompareResult(d);
      log(`✓ TRAINED reward=${d.trained?.reward}  BASELINE reward=${d.baseline?.reward}  Δ=${d.improvement}`,'#70D070','✓');
    }catch(e){log(`✗ ${e.message}`,'#E87070','✗');}
    finally{setComparing(false);}
  };

  const loadCharts=useCallback(async()=>{
    setChartsLoading(true);
    try{
      const [rep,rnd]=await Promise.all([
        fetch(`${B}/report`).then(r=>r.json()),

    finally{setTileLoading(false);}
  },[region,map,tileYear]);

  useEffect(()=>{
    if(activeTab==='charts')loadCharts();
    if(activeTab==='map')loadTiles(tileYear);
  },[activeTab,region]);

  // Init/update Leaflet map
  useEffect(()=>{
    if(activeTab!=='map')return;
    const container=document.getElementById('leaflet-container');
    if(!container)return;
    // Get basin coords
    const ri=(map?.regions||[]).find(r=>r.id===region);
    const lat=ri?.lat||26.5; const lon=ri?.lon||90.5;
    setTimeout(()=>{
      if(!leafletMap.current){
        leafletMap.current=window.L&&L.map('leaflet-container',{zoomControl:true}).setView([lat,lon],7);
        if(leafletMap.current){
          L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{attribution:'Esri',maxZoom:18}).addTo(leafletMap.current);
          leafletRef.current=true;
        }
      }else{
        leafletMap.current.setView([lat,lon],7);
        // Remove old GEE layers
        leafletMap.current.eachLayer(l=>{if(l._url&&l._url.includes('earthengine'))leafletMap.current.removeLayer(l);});
      }
      // Add GEE tile layers
      if(leafletMap.current&&floodTiles[activeLayer]){
        const url=floodTiles[activeLayer];
        L.tileLayer(url,{opacity:0.7,attribution:'Google Earth Engine'}).addTo(leafletMap.current);
      }

          <div style={{display:'flex',alignItems:'center',gap:14}}>

              <span className="bdg bdg-g">{health.regions?.length||15} BASINS</span>
            </>)}
          </div>
        </div>

        <div className="divg" style={{marginBottom:24}}/>

        <div className="divg" style={{marginTop:24}}/>
      </div>

      {/* MAIN LAYOUT */}
      <div style={{maxWidth:1360,margin:'0 auto',padding:'0 24px 60px',display:'grid',gridTemplateColumns:'1fr 360px',gap:20}}>

        {/* LEFT */}

          {/* Season selector */}

            <div className="fm" style={{fontSize:9,color:'#4A3A18',letterSpacing:'.15em',marginBottom:10}}>◈ SELECT SEASON</div>

                  <span className="fb" style={{fontSize:13,fontWeight:600,letterSpacing:'.05em'}}>{s.label}</span>
                  <span className="fm" style={{fontSize:9,opacity:.65}}>{s.months}</span>
                </button>
              ))}
            </div>
          </DC>

          {/* Basin selector */}

              {[2022,2023,2024].map(yr=>(

                    <div className="fm" style={{fontSize:8,color:'#4A3A18'}}>{r.state?.split('/')[0].trim()}</div>

                  {ep?.history?.length>0&&(
                    <div>
                      <div className="fm" style={{fontSize:8,color:'#3A2D10',letterSpacing:'.15em',marginBottom:8}}>◈ STEP HISTORY</div>

                        <div key={i} className="card au" style={{padding:'9px 12px',marginBottom:5,borderColor:h.reward>0.3?'rgba(201,150,42,.2)':'rgba(201,150,42,.07)'}}>
                          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:3}}>
                            <span className="bdg bdg-g" style={{fontSize:8}}>STEP {h.step}</span>
                            <div style={{flex:1}}><RBar val={h.reward||0}/></div>
                            <span className="fm" style={{fontSize:11,color:'#E8B84B'}}>+{h.reward?.toFixed(3)}</span>
                          </div>
                          {h.action&&<p className="fb" style={{fontSize:12,color:'#7A6830',lineHeight:1.5}}>{h.action.substring(0,140)}{h.action.length>140?'...':''}</p>}
                        </div>

                    </div>
                  )}
                </div>

              {/* Compare result */}
              {compareResult&&activeTab==='demo'&&(

                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
                    <div style={{padding:'10px',background:'rgba(112,160,112,.05)',border:'1px solid rgba(112,160,112,.2)'}}>
                      <div className="fm" style={{fontSize:8,color:'#70D070',marginBottom:4}}>TRAINED RL MODEL · {compareResult.trained?.reward}</div>
                      <div className="fm" style={{fontSize:8,color:'#3A2D10',marginBottom:4}}>LunaAmagi/chronostasis-3b-grpo-medium</div>
                      <p className="fb" style={{fontSize:11,color:'#8B7840',lineHeight:1.5}}>{compareResult.trained?.response?.substring(0,200)}...</p>
                    </div>
                    <div style={{padding:'10px',background:'rgba(139,58,10,.05)',border:'1px solid rgba(139,58,10,.2)'}}>
                      <div className="fm" style={{fontSize:8,color:'#E87A40',marginBottom:4}}>BASELINE (VAGUE) · {compareResult.baseline?.reward}</div>
                      <div className="fm" style={{fontSize:8,color:'#3A2D10',marginBottom:4}}>Untrained fallback</div>
                      <p className="fb" style={{fontSize:11,color:'#8B7840',lineHeight:1.5}}>{compareResult.baseline?.response}</p>
                    </div>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <span className="fm" style={{fontSize:9,color:'#4A3A18'}}>IMPROVEMENT:</span>
                    <span className="fm" style={{fontSize:14,fontWeight:700,color:'#70D070'}}>+{compareResult.improvement?.toFixed(3)}</span>
                    <div style={{flex:1,height:3,background:'#1a1a1a',marginLeft:8}}>
                      <div style={{height:'100%',width:`${Math.min((compareResult.trained?.reward||0)*100,100)}%`,background:'linear-gradient(90deg,#70D07044,#70D070)'}}/>
                    </div>
                    <span className="fm" style={{fontSize:11,color:'#70D070'}}>{Math.round((compareResult.trained?.reward||0)*100)}%</span>
                  </div>
                </div>
              )}

              {/* CHARTS TAB */}
              {activeTab==='charts'&&(
                <div style={{display:'flex',flexDirection:'column',gap:14}}>
                  {chartsLoading&&<div className="fm" style={{color:'#C9962A',fontSize:10,padding:'20px 0',textAlign:'center'}}>⟳ Loading charts...</div>}
                  {/* Inline SAR flood extent chart */}
                  {reportData&&(()=>{

                    const fa=r.flood_areas||{};

                    const vals=years.map(y=>fa[y]||fa[String(y)]||0);
                    const mx=Math.max(...vals)||1;
                    const peak=r.peak_year||2022;
                    const rz=r.risk_zones_km2||{high:3218,moderate:5901,low:8234};

                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>

                          <svg viewBox="0 0 280 160" style={{width:'100%'}}>
                            {years.map((y,i)=>{
                              const h=Math.round((vals[i]/mx)*110);

                              const c=y===peak?'#E8B84B':'#4A3A18';
                              return(<g key={y}>
                                <rect x={x} y={150-h} width={50} height={h} fill={c} opacity={y===peak?0.85:0.45} rx="1"/>

                            {[['HIGH',rz.high,'#E87070'],['MODERATE',rz.moderate,'#E8B84B'],['LOW',rz.low,'#70A070']].map(([l,v,c],i)=>{

                                <rect x={30} y={20+i*44} width={w} height={24} fill={c} opacity="0.7" rx="1"/>

                      <div className="fm" style={{fontSize:9,color:'#4A3A18',letterSpacing:'.15em',marginBottom:10}}>◈ MATPLOTLIB FLOOD REPORTS</div>
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                        {Object.entries(chartImgs).map(([name,b64])=>(
                          <div key={name} className="card" style={{padding:10}}>
                            <div className="fm" style={{fontSize:8,color:'#3A2D10',marginBottom:6,textTransform:'uppercase',letterSpacing:'.1em'}}>{name.replace(/_/g,' ')}</div>
                            <img src={`data:image/png;base64,${b64}`} style={{width:'100%',borderRadius:1}} alt={name}/>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                  {!chartsLoading&&Object.keys(chartImgs).length===0&&!reportData&&(
                    <div style={{textAlign:'center',padding:'30px 0'}}>
                      <div className="fm" style={{color:'#3A2D10',fontSize:10,marginBottom:8}}>No chart data yet</div>
                      <button className="btn btn-g" onClick={loadCharts}>⟳ LOAD CHARTS</button>
                    </div>
                  )}
                </div>
              )}

              {/* FLOOD MAP TAB */}
              {activeTab==='map'&&(
                <div style={{display:'flex',flexDirection:'column',gap:12}}>
                  {/* Layer controls */}
                  <div className="card" style={{padding:12}}>
                    <div className="fm" style={{fontSize:9,color:'#4A3A18',letterSpacing:'.15em',marginBottom:8}}>◈ FLOOD RISK MAP — {(map?.regions||[]).find(r=>r.id===region)?.name||region}</div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:8}}>
                      <span className="fm" style={{fontSize:9,color:'#3A2D10',alignSelf:'center'}}>YEAR:</span>
                      {[2022,2023,2024].map(yr=>(
                        <button key={yr} onClick={()=>{setTileYear(yr);loadTiles(yr);}}
                          style={{padding:'3px 12px',fontFamily:"'Share Tech Mono',monospace",fontSize:9,cursor:'pointer',border:`1px solid ${tileYear===yr?'rgba(201,150,42,.6)':'rgba(201,150,42,.18)'}`,background:tileYear===yr?'rgba(201,150,42,.12)':'transparent',color:tileYear===yr?'#E8B84B':'#4A3A18'}}>
                          {yr}
                        </button>
                      ))}
                      <span className="fm" style={{fontSize:9,color:'#3A2D10',alignSelf:'center',marginLeft:8}}>LAYER:</span>
                      {[['risk','RISK ZONES','#E87070'],['flood','FLOOD EXTENT','#70A0E8'],['chronic','CHRONIC','#E87070']].map(([l,t,c])=>(
                        <button key={l} onClick={()=>setActiveLayer(l)}
                          style={{padding:'3px 12px',fontFamily:"'Share Tech Mono',monospace",fontSize:9,cursor:'pointer',border:`1px solid ${activeLayer===l?c+'88':c+'22'}`,background:activeLayer===l?c+'18':'transparent',color:activeLayer===l?c:'#4A3A18'}}>
                          {t}
                        </button>
                      ))}
                      {tileLoading&&<span className="fm" style={{fontSize:9,color:'#C9962A',alignSelf:'center'}}>⟳ Loading tiles...</span>}
                    </div>
                    {/* GEE status */}
                    <div className="fm" style={{fontSize:8,color:floodTiles[activeLayer]?'#70D070':'#4A3A18'}}>
                      {floodTiles[activeLayer]?'✓ GEE tiles loaded — real Sentinel-1 SAR data':'⚠ GEE tiles not loaded — showing basemap only'}
                    </div>
                  </div>
                  {/* Leaflet map */}
                  <div id="leaflet-container" style={{height:480,background:'#040404',border:'1px solid rgba(201,150,42,.18)',borderRadius:2,position:'relative'}}>
                    {/* Leaflet injects here via useEffect */}
                  </div>
                  {/* Legend */}
                  <div className="card" style={{padding:10}}>
                    <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
                      {activeLayer==='risk'&&[['#ff0000','High Risk (>0.65)'],['#ff8800','Moderate (0.35–0.65)'],['#00aa00','Low Risk (<0.35)']].map(([c,l])=>(
                        <div key={l} style={{display:'flex',alignItems:'center',gap:5}}>
                          <div style={{width:12,height:12,background:c,opacity:.7}}/>
                          <span className="fm" style={{fontSize:8,color:'#4A3A18'}}>{l}</span>
                        </div>
                      ))}
                      {activeLayer==='flood'&&<div style={{display:'flex',alignItems:'center',gap:5}}><div style={{width:12,height:12,background:'#0044ff',opacity:.7}}/><span className="fm" style={{fontSize:8,color:'#4A3A18'}}>SAR Flood Extent ({tileYear})</span></div>}
                      {activeLayer==='chronic'&&<div style={{display:'flex',alignItems:'center',gap:5}}><div style={{width:12,height:12,background:'#ff0000',opacity:.7}}/><span className="fm" style={{fontSize:8,color:'#4A3A18'}}>Chronically Flooded (all 3 years)</span></div>}
                      <span className="fm" style={{fontSize:8,color:'#3A2D10',marginLeft:'auto'}}>Data: Sentinel-1 SAR · GEE · −16 dB threshold</span>
                    </div>
                  </div>
                  {/* Download GEE script */}
                  <div style={{display:'flex',gap:8}}>
                    {[2022,2023,2024].map(yr=>(
                      <a key={yr} href={`${B}/gee/code?region_id=${region}&year=${yr}`}
                        download={`chronostasis_${region}_${yr}.js`}
                        style={{display:'inline-flex',alignItems:'center',gap:5,padding:'6px 14px',border:'1px solid rgba(201,150,42,.25)',background:'rgba(201,150,42,.06)',color:'#C9962A',textDecoration:'none',fontFamily:"'Share Tech Mono',monospace",fontSize:9,letterSpacing:'.08em'}}>
                        ⬇ GEE Script {yr}
                      </a>
                    ))}
                  </div>
                </div>
              )}

              {/* ALL BASINS TAB */}
              {activeTab==='basins'&&map?.regions&&(
                <DC>
                  <div className="fm" style={{fontSize:9,color:'#4A3A18',letterSpacing:'.15em',marginBottom:14}}>◈ COMPARATIVE OVERVIEW — {map.regions.length} BASINS</div>
                  <div style={{overflowX:'auto'}}>
                    <table style={{width:'100%',borderCollapse:'collapse'}}>
                      <thead>
                        <tr style={{borderBottom:'1px solid rgba(201,150,42,.18)'}}>
                          {['Basin','State','Peak Year','Peak Flood','At Risk','Accuracy','Risk'].map(h=>(
                            <th key={h} style={{padding:'5px 10px',textAlign:'left',fontFamily:'Share Tech Mono',fontSize:8,color:'#4A3A18',letterSpacing:'.1em',fontWeight:400}}>{h.toUpperCase()}</th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {map.regions.map(r=>{
                          const rc=RC[r.risk_level]||'#C9962A';
                          const on=region===r.id;
                          return(
                            <tr key={r.id} onClick={()=>setRegion(r.id)}
                              style={{borderBottom:'1px solid rgba(201,150,42,.05)',cursor:'pointer',background:on?'rgba(201,150,42,.04)':'transparent',transition:'background .15s'}}>
                              <td style={{padding:'7px 10px',fontFamily:'Rajdhani',fontWeight:700,fontSize:13,color:on?'#E8B84B':'#D4C89A'}}>{r.name?.split(' ')[0]}</td>
                              <td style={{padding:'7px 10px',fontFamily:'Share Tech Mono',fontSize:9,color:'#4A3A18'}}>{r.state?.split('/')[0].trim()}</td>
                              <td style={{padding:'7px 10px',fontFamily:'Share Tech Mono',fontSize:10,color:'#C9962A'}}>{r.peak_year}</td>
                              <td style={{padding:'7px 10px',fontFamily:'Share Tech Mono',fontSize:10,color:'#D4C89A'}}>{r.peak_flood_km2?.toLocaleString()} km²</td>
                              <td style={{padding:'7px 10px',fontFamily:'Share Tech Mono',fontSize:10,color:'#7A6830'}}>{(r.chronic_pop/1e6).toFixed(1)}M</td>
                              <td style={{padding:'7px 10px',fontFamily:'Share Tech Mono',fontSize:10,color:'#C9962A'}}>{r.accuracy_pct}%</td>
                              <td style={{padding:'7px 10px'}}><span className="bdg" style={{background:`${rc}15`,border:`1px solid ${rc}30`,color:rc,fontSize:8}}>{r.risk_level?.toUpperCase()}</span></td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </DC>
              )}

              {/* API TAB */}
              {activeTab==='api'&&(
                <DC>
                  <div className="fm" style={{fontSize:9,color:'#4A3A18',letterSpacing:'.15em',marginBottom:14}}>◈ OPENENV API ENDPOINTS</div>
                  {[['POST','/reset','Start episode','{"task_id":"flood_year_comparison","region_id":"brahmaputra","season":"kharif"}'],
                    ['POST','/step','Submit action','{"message":"2022 had 4812.3 km² SAR extent..."}'],
                    ['GET','/state','Episode state',null],
                    ['POST','/agent/step','4-Agent pipeline','{"task_id":"...","region_id":"..."}'],
                    ['GET','/regions','All 15 basins',null],
                    ['GET','/india_risk_map','All-India risk','?season=kharif'],
                    ['GET','/health','Health check',null],
                    ['GET','/gee/code','Download GEE code','?region_id=brahmaputra&year=2022'],
                    ['GET','/gee/code/all','All-India GEE code',null],
                  ].map(([m,path,d,body])=>(
                    <div key={path} className="card" style={{padding:'9px 12px',marginBottom:6}}>
                      <div style={{display:'flex',alignItems:'center',gap:7}}>
                        <span className="bdg" style={{background:m==='POST'?'rgba(40,140,40,.15)':'rgba(201,150,42,.12)',border:`1px solid ${m==='POST'?'rgba(40,180,40,.25)':'rgba(201,150,42,.28)'}`,color:m==='POST'?'#70D070':'#E8B84B'}}>{m}</span>
                        <span className="fm" style={{color:'#D4C89A',fontSize:12}}>{path}</span>
                        <span className="fb" style={{marginLeft:'auto',fontSize:11,color:'#3A2D10'}}>{d}</span>
                      </div>
                      {body&&<div className="fm" style={{fontSize:9,color:'#3A2D10',marginTop:5,padding:'3px 8px',background:'#040404',borderLeft:'2px solid rgba(201,150,42,.18)'}}>{body}</div>}
                    </div>
                  ))}
                </DC>
              )}
            </div>
          </div>
        </div>

        {/* RIGHT SIDEBAR */}
        <div style={{display:'flex',flexDirection:'column',gap:12}}>

          {/* India map — always visible */}
          <IndiaMap mapData={map} region={region} setRegion={setRegion} season={season}/>

          {/* Task cards */}
          <div>
            <div className="fm" style={{fontSize:8,color:'#3A2D10',letterSpacing:'.15em',marginBottom:7}}>◈ TASKS</div>
            {Object.entries(TM).map(([id,m])=>(
              <div key={id} className={`card ${task===id?'card-active':''}`}
                onClick={()=>{setTask(id);setActiveTab('demo');}}
                style={{padding:'11px 13px',marginBottom:5,cursor:'pointer',transition:'all .15s',borderColor:task===id?`${m.color}44`:'rgba(201,150,42,.1)'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:3}}>
                  <span className="fb" style={{fontSize:13,fontWeight:700,color:task===id?m.color:'#D4C89A'}}>{m.label}</span>
                  <span className={`bdg bdg-${m.diff.toLowerCase()}`}>{m.diff}</span>
                </div>
                <div className="fm" style={{fontSize:9,color:'#3A2D10'}}>max {m.steps} steps · reward ∈ (0,1)</div>
              </div>
            ))}
          </div>

          {/* Training results */}
          <DC>
            <div className="fm" style={{fontSize:8,color:'#4A3A18',letterSpacing:'.15em',marginBottom:11}}>◈ TRAINING RESULTS</div>
            <button onClick={()=>{
              const data = {
                training_pipeline: {
                  sft: {model:"Qwen2.5-1.5B-Instruct",epochs:38,loss_start:2.717,loss_end:0.017},
                  grpo_1_5b_easy: {task:"flood_year_comparison",steps:100,reward_start:0.855,reward_end:0.884},
                  grpo_1_5b_medium: {task:"district_inundation_report",steps:400,reward_start:0.489,reward_end:0.688},
                  grpo_3b_medium: {task:"district_inundation_report",steps:300,reward_start:0.670,reward_end:0.823},
                  grpo_3b_hard: {task:"flood_risk_forecast",steps:210,reward_start:0.728,reward_end:0.842},
                },
                four_agent_results: {
                  flood_year_comparison:0.99,
                  district_inundation_report:0.99,
                  flood_risk_forecast:0.70,
                  precision:1.0, recall:1.0, f1:1.0
                },
                models:{
                  sft:"https://huggingface.co/LunaAmagi/chronostasis-sft-trained",
                  grpo_3b_medium:"https://huggingface.co/LunaAmagi/chronostasis-3b-grpo-medium",
                  grpo_3b_hard:"https://huggingface.co/LunaAmagi/chronostasis-3b-grpo-hard",
                },
                environment:"https://huggingface.co/spaces/LunaAmagi/chronostasis",
                basins:15,regions:["brahmaputra","ganga","mahanadi","krishna","godavari","narmada","tapti","cauvery","damodar","sabarmati","mahi","baitarani","subarnarekha","indus","luni"]
              };
              const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
              const a=document.createElement('a');a.href=URL.createObjectURL(blob);
              a.download='chronostasis_results.json';a.click();
            }}
            style={{marginTop:8,width:'100%',padding:'6px',background:'rgba(201,150,42,.08)',border:'1px solid rgba(201,150,42,.25)',color:'#C9962A',fontFamily:"'Share Tech Mono',monospace",fontSize:9,letterSpacing:'.1em',cursor:'pointer',textTransform:'uppercase'}}
            >⬇ DOWNLOAD RESULTS JSON</button>
            {[['BASELINE',[0.01,0.01,0.01],'#3A2D10'],
              ['SFT 1.5B',[0.65,null,null],'#6B5A30'],
              ['GRPO 1.5B',[0.884,0.688,null],'#C9962A'],
              ['GRPO 3B',[null,0.823,0.842],'#E8B84B'],
              ['4-AGENT',[0.99,0.99,0.70],'#E8B84B'],
            ].map(([l,v,c])=>(
              <div key={l} style={{marginBottom:7}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:2}}>
                  <span className="fm" style={{fontSize:9,color:c}}>{l}</span>
                  <div style={{display:'flex',gap:10}}>
                    {v.map((val,i)=>(
                      <span key={i} className="fm" style={{fontSize:10,color:val!=null?c:'#1a1a1a',minWidth:28,textAlign:'right'}}>{val!=null?val.toFixed(2):'—'}</span>
                    ))}
                  </div>
                </div>
                {l==='4-AGENT'&&<div style={{height:2,background:'#111'}}><div style={{width:'99%',height:'100%',background:`linear-gradient(90deg,${c}44,${c})`,boxShadow:`0 0 8px ${c}44`}}/></div>}
              </div>
            ))}
            <div style={{display:'flex',justifyContent:'flex-end',gap:16,marginTop:6}}>
              {['EASY','MED','HARD'].map(t=><span key={t} className="fm" style={{fontSize:8,color:'#3A2D10'}}>{t}</span>)}
            </div>
          </DC>

          {/* Links */}
          <DC>
            <div className="fm" style={{fontSize:8,color:'#4A3A18',letterSpacing:'.15em',marginBottom:9}}>◈ RESOURCES</div>
            {[['GitHub','lunasingha1928-oss/Chronostasis','https://github.com/lunasingha1928-oss/Chronostasis'],
              ['HF Space','LunaAmagi/chronostasis','https://huggingface.co/spaces/LunaAmagi/chronostasis'],
              ['3B Model','chronostasis-3b-grpo-medium','https://huggingface.co/LunaAmagi/chronostasis-3b-grpo-medium'],
              ['API Docs','/docs','/docs'],
            ].map(([l,t,h])=>(
              <a key={l} href={h} target="_blank" rel="noopener"
                style={{display:'flex',alignItems:'center',gap:7,marginBottom:5,textDecoration:'none',padding:'2px 0'}}>
                <div style={{width:3,height:3,background:'#4A3A18',flexShrink:0}}/>
                <span className="fm" style={{fontSize:9,color:'#4A3A18',minWidth:52}}>{l}</span>
                <span className="fm" style={{fontSize:9,color:'#3A2D10'}}>{t}</span>
              </a>
            ))}
          </DC>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
<!-- Leaflet map tab appended -->
